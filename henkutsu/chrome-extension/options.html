<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>henkutsu 設定</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      background: #f8f8f8;
      color: #111;
      padding: 40px;
      max-width: 520px;
    }

    h1 {
      font-size: 20px;
      font-weight: 700;
      color: #e60023;
      margin-bottom: 6px;
    }
    .subtitle {
      font-size: 12px;
      color: #888;
      margin-bottom: 32px;
    }

    .section {
      background: #fff;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      padding: 20px 24px;
      margin-bottom: 20px;
    }
    .section h2 {
      font-size: 13px;
      font-weight: 700;
      color: #333;
      margin-bottom: 14px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .field { margin-bottom: 14px; }
    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #555;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 5px;
      padding: 9px 11px;
      font-size: 13px;
      color: #111;
      background: #fafafa;
      outline: none;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #e60023; background: #fff; }
    .hint {
      font-size: 11px;
      color: #999;
      margin-top: 4px;
      line-height: 1.5;
    }

    #btn-save {
      width: 100%;
      padding: 12px;
      background: #e60023;
      color: #fff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.15s;
    }
    #btn-save:hover { background: #c0001e; }

    #status {
      margin-top: 12px;
      font-size: 12px;
      text-align: center;
      min-height: 18px;
    }
    #status.success { color: #1a8a1a; }
    #status.error   { color: #e60023; }
  </style>
</head>
<body>
  <h1>📌 henkutsu 設定</h1>
  <p class="subtitle">アフィリエイトタグを設定します</p>

  <div class="section">
    <h2>Amazon アフィリエイト</h2>
    <div class="field">
      <label>アソシエイトタグ</label>
      <input type="text" id="amazon-tag" placeholder="hustle-digger-22">
      <p class="hint">Amazon URLに自動付与されます。空白の場合は <code>hustle-digger-22</code> を使用します。</p>
    </div>
  </div>

  <button id="btn-save">保存</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
