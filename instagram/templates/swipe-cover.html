<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1080">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 1080px;
    height: 1080px;
    overflow: hidden;
    background: #06061a;
    font-family: 'Noto Serif JP', 'Yu Mincho', 'Hiragino Mincho ProN', 'Georgia', serif;
    color: #f0e8d0;
    position: relative;
  }

  /* 星空 */
  .starfield {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(1px 1px at 12% 15%, rgba(255,255,255,0.7) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 78% 8%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 42% 4%, rgba(255,255,255,0.6) 0%, transparent 100%),
      radial-gradient(1px 1px at 90% 30%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 6% 58%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(2px 2px at 55% 12%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 28% 75%, rgba(255,255,255,0.4) 0%, transparent 100%),
      radial-gradient(1px 1px at 70% 68%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 50% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1.5px 1.5px at 18% 42%, rgba(255,255,255,0.35) 0%, transparent 100%),
      radial-gradient(1px 1px at 85% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
      radial-gradient(1px 1px at 38% 52%, rgba(255,255,255,0.25) 0%, transparent 100%),
      radial-gradient(2px 2px at 3% 88%, rgba(255,255,255,0.3) 0%, transparent 100%),
      radial-gradient(1px 1px at 93% 78%, rgba(255,255,255,0.45) 0%, transparent 100%),
      radial-gradient(1px 1px at 65% 35%, rgba(255,255,255,0.3) 0%, transparent 100%);
  }

  /* 霞 */
  .nebula {
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 700px 400px at 50% 25%, rgba(60, 20, 100, 0.18) 0%, transparent 70%),
      radial-gradient(ellipse 500px 600px at 80% 70%, rgba(15, 50, 110, 0.12) 0%, transparent 70%),
      radial-gradient(ellipse 400px 300px at 10% 80%, rgba(30, 8, 70, 0.1) 0%, transparent 70%);
  }

  /* カテゴリラベル背景 */
  .category-bg {
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 300px;
    background: linear-gradient(180deg, rgba(201,167,110,0.05) 0%, transparent 100%);
  }

  /* 外枠 */
  .frame-outer {
    position: absolute;
    inset: 60px;
    border: 1px solid rgba(201,167,110,0.2);
  }
  .frame-inner {
    position: absolute;
    inset: 68px;
    border: 1px solid rgba(201,167,110,0.08);
  }

  /* 四隅装飾 */
  .corner {
    position: absolute;
    width: 30px;
    height: 30px;
  }
  .corner.tl { top: 60px; left: 60px; border-top: 2px solid rgba(201,167,110,0.6); border-left: 2px solid rgba(201,167,110,0.6); }
  .corner.tr { top: 60px; right: 60px; border-top: 2px solid rgba(201,167,110,0.6); border-right: 2px solid rgba(201,167,110,0.6); }
  .corner.bl { bottom: 60px; left: 60px; border-bottom: 2px solid rgba(201,167,110,0.6); border-left: 2px solid rgba(201,167,110,0.6); }
  .corner.br { bottom: 60px; right: 60px; border-bottom: 2px solid rgba(201,167,110,0.6); border-right: 2px solid rgba(201,167,110,0.6); }

  /* コンテンツ */
  .content {
    position: relative;
    z-index: 10;
    width: 100%;
    height: 100%;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 120px;
    text-align: center;
  }

  /* カテゴリ */
  .category-tag {
    font-size: 20px;
    letter-spacing: 0.4em;
    color: rgba(201,167,110,0.65);
    margin-bottom: 36px;
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 300;
  }

  /* 大見出し装飾 */
  .title-deco {
    font-size: 44px;
    color: rgba(201,167,110,0.25);
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }

  /* フックコピー */
  .hook {
    font-size: 42px;
    line-height: 1.65;
    letter-spacing: 0.06em;
    color: #f0e8d0;
    max-width: 820px;
    margin-bottom: 52px;
  }
  .hook em {
    font-style: normal;
    color: #c9a76e;
    border-bottom: 1px solid rgba(201,167,110,0.4);
    padding-bottom: 2px;
  }

  /* スワイプ誘導 */
  .swipe-cta {
    display: flex;
    align-items: center;
    gap: 14px;
    color: rgba(240,232,208,0.5);
    font-size: 20px;
    letter-spacing: 0.2em;
  }
  .swipe-arrow {
    font-size: 22px;
    color: rgba(201,167,110,0.5);
    animation: none;
  }

  /* ブランド */
  .footer {
    position: absolute;
    bottom: 46px;
    left: 0; right: 0;
    text-align: center;
  }
  .brand {
    font-size: 18px;
    letter-spacing: 0.4em;
    color: rgba(201,167,110,0.35);
    font-family: 'Helvetica Neue', sans-serif;
    font-weight: 300;
  }
</style>
</head>
<body>
  <div class="starfield"></div>
  <div class="nebula"></div>
  <div class="category-bg"></div>

  <div class="frame-outer"></div>
  <div class="frame-inner"></div>
  <div class="corner tl"></div>
  <div class="corner tr"></div>
  <div class="corner bl"></div>
  <div class="corner br"></div>

  <div class="content">
    <div class="category-tag">{{CATEGORY}}</div>
    <div class="title-deco">———</div>
    <div class="hook">{{HOOK}}</div>
    <div class="swipe-cta">
      <span>スライドして読む</span>
      <span class="swipe-arrow">›</span>
    </div>
  </div>

  <div class="footer">
    <div class="brand">夜中のおじさん</div>
  </div>
</body>
</html>
