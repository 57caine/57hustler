name: SNS自動投稿

on:
  # 毎日 JST 9:00 と 20:00 に自動実行
  schedule:
    - cron: '0 0 * * *'   # UTC 0:00 = JST 9:00
    - cron: '0 11 * * *'  # UTC 11:00 = JST 20:00

  # GitHub の画面から手動実行もできる
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'プレビューのみ（実際には投稿しない）'
        required: false
        default: 'false'
        type: boolean

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Python をセットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: auto-revenue/requirements.txt

      - name: ライブラリをインストール
        run: pip install -r auto-revenue/requirements.txt

      - name: .env を作成（Secrets から環境変数を注入）
        run: |
          cat > auto-revenue/.env << EOF
          ANTHROPIC_API_KEY=${{ secrets.ANTHROPIC_API_KEY }}
          X_API_KEY=${{ secrets.X_API_KEY }}
          X_API_SECRET=${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN=${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET=${{ secrets.X_ACCESS_TOKEN_SECRET }}
          RSS_URLS=${{ secrets.RSS_URLS }}
          NEWS_KEYWORDS=${{ secrets.NEWS_KEYWORDS }}
          EOF

      - name: SNS自動投稿を実行
        run: |
          if [ "${{ github.event.inputs.dry_run }}" = "true" ]; then
            python auto-revenue/main.py --dry
          else
            python auto-revenue/main.py
          fi

      - name: 投稿済みファイルをコミット & プッシュ
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add auto-revenue/posts/ auto-revenue/schedule.md
          git diff --cached --quiet || git commit -m "auto: $(date +'%Y-%m-%d %H:%M') 投稿済み"
          git push
