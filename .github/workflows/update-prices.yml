name: 価格データ・アフィリエイトリンク自動更新

on:
  schedule:
    # 1日3回実行: 6:00 / 14:00 / 22:00 JST (UTC: 21:00前日 / 05:00 / 13:00)
    - cron: '0 21 * * *'   # 06:00 JST
    - cron: '0 5 * * *'    # 14:00 JST
    - cron: '0 13 * * *'   # 22:00 JST
  workflow_dispatch:

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: リポジトリをチェックアウト
        uses: actions/checkout@v4

      - name: Node.js セットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: 依存関係インストール
        run: npm ci

      - name: Playwright ブラウザをインストール
        run: npx playwright install chromium --with-deps

      - name: A8.net コンタクトレンズ用アフィリエイトリンク取得
        run: npx ts-node scripts/fetch-a8-links.ts
        env:
          A8_JSESSIONID: ${{ secrets.A8_JSESSIONID }}
        continue-on-error: true

      - name: A8.net スクール・資格用アフィリエイトリンク取得
        run: npx ts-node scripts/fetch-school-links.ts
        env:
          A8_JSESSIONID: ${{ secrets.A8_JSESSIONID }}
        continue-on-error: true

      - name: 価格データ更新（実スクレイピング）
        run: npx ts-node scripts/update-prices.ts
        env:
          NODE_ENV: production

      - name: 変更をコミット・プッシュ
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Actions Bot"
          git add data/prices.json data/products.json \
                  school-navi/data/schools.json \
                  shikaku-navi/data/courses.json
          git diff --staged --quiet || git commit -m "chore: 価格・アフィリエイトリンク自動更新 $(date '+%Y-%m-%d %H:%M JST')"
          git pull --rebase origin $(git rev-parse --abbrev-ref HEAD)
          git push
