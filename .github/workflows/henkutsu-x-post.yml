name: henkutsu X投稿（手動）

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: '商品名'
        required: true
      comment:
        description: '一言コメント'
        required: true
      url:
        description: '商品URL（Amazon or 楽天）'
        required: true

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 依存ライブラリをインストール
        run: pip install tweepy

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          AMAZON_ASSOCIATE_TAG: ""
          RAKUTEN_AFFILIATE_ID: ""
        run: python henkutsu/post.py "${{ inputs.product_name }}" "${{ inputs.comment }}" "${{ inputs.url }}"
