name: henkutsu X投稿

on:
  workflow_dispatch:
    inputs:
      product_name:
        description: '商品名（例: ワイヤレス充電器 Anker）'
        required: true
        type: string
      comment:
        description: '一言コメント（例: これ買って正解だった）'
        required: true
        type: string
      url:
        description: '商品URL（Amazon または 楽天 → アフィリリンクに自動変換）'
        required: true
        type: string

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 依存関係インストール
        run: pip install -r henkutsu/requirements.txt

      - name: X に投稿
        env:
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          AMAZON_ASSOCIATE_TAG: ${{ secrets.AMAZON_ASSOCIATE_TAG }}
          RAKUTEN_AFFILIATE_ID: ${{ secrets.RAKUTEN_AFFILIATE_ID }}
        run: |
          printf '%s\n%s\n%s\ny\n' \
            "${{ inputs.product_name }}" \
            "${{ inputs.comment }}" \
            "${{ inputs.url }}" \
          | python henkutsu/post.py
